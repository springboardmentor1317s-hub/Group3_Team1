<div class="events-shell">
  <header class="luxury-header">
    <div class="header-inner">
      <button class="brand-block" type="button" (click)="navigate('dashboard')">
        <img class="brand-logo" src="/icon2.png" alt="Campus Event Hub">
        <div class="brand-copy">
          <span class="brand-name">Campus Event Hub</span>
          <span class="eyebrow">Student Lounge</span>
        </div>
      </button>

      <nav class="header-nav">
        <button type="button" class="nav-link" (click)="navigate('dashboard')">Dashboard</button>
        <button type="button" class="nav-link active">Events</button>
        <button type="button" class="nav-link" (click)="navigate('registrations')">My Registrations</button>
        <button type="button" class="nav-link" (click)="navigate('feedback')">Feedback</button>
      </nav>

      <div class="header-actions">
        <button type="button" class="profile-chip" (click)="navigate('profile')">
          <img *ngIf="profilePhotoUrl as photo; else eventsAvatarFallback" class="profile-chip-avatar" [src]="photo" [alt]="studentName">
          <ng-template #eventsAvatarFallback>
            <span class="material-icons">account_circle</span>
          </ng-template>
          <span class="profile-chip-name">{{ studentName }}</span>
        </button>
        <button type="button" class="notification-btn" (click)="openNotifications()" aria-label="Notifications">
          <span class="material-icons">notifications</span>
        </button>
        <button type="button" class="logout-btn" (click)="logout()">
          <span class="material-icons">logout</span>
          <span>Logout</span>
        </button>
      </div>
    </div>
  </header>

  <main class="events-main">
    <section class="intro-card">
      <div>
        <h1>Browse Events</h1>
      </div>
    </section>

    <p *ngIf="errorMessage" class="error-banner">{{ errorMessage }}</p>

    <section class="filters-card">
      <label>
        <span>Search</span>
        <input type="text" placeholder="Search event name, details, or location" [(ngModel)]="searchQuery" (input)="applyFilters()">
      </label>

      <label>
        <span>Category</span>
        <select [(ngModel)]="selectedCategory" (change)="applyFilters()">
          <option *ngFor="let category of categories" [value]="category">{{ category }}</option>
        </select>
      </label>

      <label>
        <span>College</span>
        <select [(ngModel)]="selectedCollege" (change)="applyFilters()">
          <option *ngFor="let college of colleges" [value]="college">{{ college }}</option>
        </select>
      </label>

      <label>
        <span>Date</span>
        <input type="date" [(ngModel)]="selectedDate" (change)="applyFilters()">
      </label>

      <div class="filter-actions">
        <button type="button" class="clear-filter-btn" (click)="clearFilters()">Clear Filters</button>
      </div>
    </section>

    <section *ngIf="loading" class="state-card">Loading events...</section>

    <section class="event-grid" *ngIf="!loading && filteredEvents.length > 0">

      <div class="event-card-stack" *ngFor="let event of filteredEvents; trackBy: trackById">
        <app-event-card
          [event]="event"
          [registerLabel]="getRegisterLabel(event)"
          [registerDisabled]="event.status !== 'Open' || actionEventId === event.id"
          [showRegisterButton]="true"
          (registerClicked)="registerForEvent(event)"
        ></app-event-card>
      </div>

    </section>

    <section *ngIf="!loading && filteredEvents.length === 0" class="state-card">
      No events matched the selected filters.
    </section>
  </main>
  <app-site-footer></app-site-footer>
</div>
