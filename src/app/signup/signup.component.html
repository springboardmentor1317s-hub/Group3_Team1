<div class="signup-card">
  <h2>Create Account</h2>
  <p class="subtitle">Join CampusEventHub — it only takes a moment</p>

  <form class="form" (ngSubmit)="onSubmit()">
    <label>Full name</label>
    <input type="text" name="name" [(ngModel)]="user.name" placeholder="Full Name" required />

    <label>Email</label>
    <input type="email" name="email" [(ngModel)]="user.email" placeholder="you@school.edu" required />

    <label>College / University</label>
    <input type="text" name="college" [(ngModel)]="user.college" placeholder="College or University" />

    <label>Role</label>
    <select name="role" [(ngModel)]="user.role" required>
      <option value="student">Student</option>
      <option value="college_admin">College Admin</option>
    </select>

    <label>Password</label>
    <div class="password-box">
      <input [type]="showPassword ? 'text' : 'password'" name="password" [(ngModel)]="user.password" placeholder="Password" required />
      <button
        type="button"
        class="password-toggle"
        [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
        (click)="showPassword = !showPassword"
      >
        {{ showPassword ? 'Hide' : 'Show' }}
      </button>
    </div>

    <label>Confirm Password</label>
    <div class="password-box">
      <input [type]="showConfirmPassword ? 'text' : 'password'" name="confirmPassword" [(ngModel)]="user.confirmPassword" placeholder="Confirm Password" required />
      <button
        type="button"
        class="password-toggle"
        [attr.aria-label]="showConfirmPassword ? 'Hide confirm password' : 'Show confirm password'"
        (click)="showConfirmPassword = !showConfirmPassword"
      >
        {{ showConfirmPassword ? 'Hide' : 'Show' }}
      </button>
    </div>

    <div class="actions">
      <button
        class="btn"
        type="submit"
        [disabled]="isSubmitting || isSuccess"
        [class.shrink]="isSubmitting || isSuccess">

        <span class="label" *ngIf="!isSubmitting && !isSuccess">Sign Up</span>
        <span class="spinner" *ngIf="isSubmitting" aria-hidden></span>
        <svg *ngIf="isSuccess" class="btn-check" viewBox="0 0 52 52" aria-hidden>
          <circle cx="26" cy="26" r="24" class="circle" fill="none"/>
          <path d="M14 27l7 7 17-17" class="check" fill="none"/>
        </svg>
      </button>
    </div>
  </form>

  <div class="success-panel" *ngIf="isSuccess">
    <div class="check-wrap">
      <svg class="success-check" viewBox="0 0 52 52" aria-hidden>
        <circle cx="26" cy="26" r="24" class="bg" fill="none"/>
        <path d="M14 27l7 7 17-17" class="mark" fill="none"/>
      </svg>
    </div>
    <h3 class="title">Account Created Successfully</h3>
    <p class="subtitle-muted">Welcome to CampusEventHub!</p>
  </div>
</div>
<app-site-footer></app-site-footer>

<div class="popup-backdrop" *ngIf="isPopupOpen" (click)="closePopup()">
  <div class="popup-card" (click)="$event.stopPropagation()" role="alertdialog" aria-modal="true" aria-labelledby="signup-popup-title">
    <h3 id="signup-popup-title">Validation Message</h3>
    <p>{{ popupMessage }}</p>
    <button type="button" class="popup-btn" (click)="closePopup()">OK</button>
  </div>
</div>
