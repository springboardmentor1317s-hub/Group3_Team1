<article class="event-card">
  <div class="event-media" [style.background-image]="cardBackground">
    <span class="status-badge" [class.registered]="statusLabel === 'Registered'" [class.closed]="statusLabel !== 'Open' && statusLabel !== 'Registered'">
      {{ statusLabel }}
    </span>
    <span class="seat-pill">{{ event.registrations }}/{{ event.maxAttendees }} seats</span>
  </div>

  <div class="event-content">
    <span class="category-pill">{{ event.category || 'General' }}</span>
    <h3>{{ event.title }}</h3>
    <p>{{ safeDescription }}</p>

    <div class="meta-list">
      <span><span class="material-icons">calendar_today</span>{{ event.dateLabel }}</span>
      <span><span class="material-icons">event_available</span>Last Registration: {{ registrationDeadlineText }}</span>
      <span><span class="material-icons">location_on</span>{{ event.location }}</span>
    </div>

    <div class="card-actions">
      <button type="button" class="view-btn" (click)="openDetails()">View Details</button>
      <button
        *ngIf="showRegisterButton"
        type="button"
        class="register-btn"
        [disabled]="registerDisabled"
        (click)="onRegisterClick()"
      >
        {{ registerLabel }}
      </button>
    </div>
  </div>
</article>
