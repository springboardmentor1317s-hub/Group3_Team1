<div class="events-shell">
  <app-student-header
    activeTab="events"
    [studentName]="studentName"
    [studentPhotoUrl]="profilePhotoUrl"
    notificationMode="dropdown"
    [notifications]="notifications"
    [notificationsLoading]="notificationsLoading"
    [notificationsOpen]="notificationsDropdownOpen"
    [unseenNotificationCount]="unseenNotificationCount"
    [showViewMore]="showNotificationViewMore"
    (notificationToggle)="openNotifications($event)"
    (viewMoreNotifications)="openNotificationsPage()"
  />

  <main class="events-main">
    <section class="intro-card">
      <div>
        <h1>Browse Events</h1>
      </div>
    </section>

    <p *ngIf="errorMessage" class="error-banner">{{ errorMessage }}</p>

    <section class="filters-card">
      <label>
        <span>Search</span>
        <input type="text" placeholder="Search event name, details, or location" [(ngModel)]="searchQuery" (input)="applyFilters()">
      </label>

      <label>
        <span>Category</span>
        <select [(ngModel)]="selectedCategory" (change)="applyFilters()">
          <option *ngFor="let category of categories" [value]="category">{{ category }}</option>
        </select>
      </label>

      <label>
        <span>College</span>
        <select [(ngModel)]="selectedCollege" (change)="applyFilters()">
          <option *ngFor="let college of colleges" [value]="college">{{ college }}</option>
        </select>
      </label>

      <label>
        <span>Date</span>
        <input type="date" [(ngModel)]="selectedDate" (change)="applyFilters()">
      </label>

      <div class="filter-actions">
        <button type="button" class="clear-filter-btn" (click)="clearFilters()">Clear Filters</button>
      </div>
    </section>

    <section *ngIf="loading && !hasVisibleEventsData" class="state-card">Loading events...</section>

    <section class="event-grid" *ngIf="filteredEvents.length > 0">

      <div class="event-card-stack" *ngFor="let event of filteredEvents; trackBy: trackById">
        <app-event-card
          [event]="event"
          [registerLabel]="getRegisterLabel(event)"
          [registerDisabled]="isRegisterDisabled(event)"
          [showRegisterButton]="!isEventCompleted(event)"
          [showRatingSummary]="isEventCompleted(event)"
          [ratingAverage]="getEventRatingAverage(event.id)"
          [ratingCount]="getEventRatingCount(event.id)"
          [ratingSummaryLoading]="isRatingSummaryLoading(event.id)"
          (registerClicked)="registerForEvent(event)"
        ></app-event-card>
      </div>

    </section>

    <section *ngIf="!loading && !hasVisibleEventsData && filteredEvents.length === 0" class="state-card">
      No events matched the selected filters.
    </section>
  </main>
</div>
