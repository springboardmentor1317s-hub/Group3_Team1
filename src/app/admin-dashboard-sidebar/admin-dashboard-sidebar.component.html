<aside class="admin-sidebar" [class.is-collapsed]="collapsed">
  <div class="sidebar-shell">
    <div class="sidebar-brand">
      <div class="sidebar-brand-row">
        <button
          type="button"
          class="sidebar-toggle-btn"
          [attr.aria-label]="collapsed ? 'Expand navigation' : 'Collapse navigation'"
          [attr.title]="collapsed ? 'Expand navigation' : 'Collapse navigation'"
          (click)="toggleCollapsed()"
        >
          <span class="material-icons" aria-hidden="true">{{ collapsed ? 'keyboard_double_arrow_right' : 'keyboard_double_arrow_left' }}</span>
        </button>
      </div>

      <div class="sidebar-copy">
        <strong>Admin Workspace</strong>
        <span>Everything you need to manage your campus events.</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <button
        *ngFor="let item of primaryNavItems"
        type="button"
        class="sidebar-link"
        [class.active]="activeTab === item.key"
        [attr.aria-label]="item.label"
        [attr.title]="collapsed ? item.label : null"
        (click)="triggerNav(item)"
      >
        <span class="sidebar-link-icon material-icons" aria-hidden="true">{{ item.icon }}</span>
        <span class="sidebar-link-copy">
          <span class="sidebar-link-label">{{ item.label }}</span>
          <span class="sidebar-link-caption">{{ item.caption }}</span>
        </span>
      </button>

      <button
        *ngFor="let item of secondaryNavItems"
        type="button"
        class="sidebar-link"
        [class.active]="activeTab === item.key"
        [attr.aria-label]="item.label"
        [attr.title]="collapsed ? item.label : null"
        (click)="triggerNav(item)"
      >
        <span class="sidebar-link-icon material-icons" aria-hidden="true">{{ item.icon }}</span>
        <span class="sidebar-link-copy">
          <span class="sidebar-link-label">{{ item.label }}</span>
          <span class="sidebar-link-caption">{{ item.caption }}</span>
        </span>
      </button>
    </nav>

    <div class="sidebar-cta">
      <button type="button" class="sidebar-link accent" [attr.title]="collapsed ? 'Create Event' : null" (click)="createEvent.emit()">
        <span class="material-icons" aria-hidden="true">add_circle</span>
        <span>Create Event</span>
      </button>
    </div>
  </div>
</aside>
