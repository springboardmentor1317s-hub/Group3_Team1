<div class="page">
  <div class="card">
    <div class="icon">
      <img class="icon-img" src="assets/icon login.png" alt="Login icon">
    </div>

    <h2>Welcome Back</h2>
    <p class="subtitle">Login to your account</p>

    <form (ngSubmit)="login()">
      <label>Email Address</label>
      <input type="email" [(ngModel)]="user.email" name="email" placeholder="Enter your email" required>

      <label>Password</label>
      <div class="password-box">
        <input [type]="show ? 'text' : 'password'" [(ngModel)]="user.password" name="password"
          placeholder="Enter your password" required>
        <i class="fa-solid" [class.fa-eye]="!show" [class.fa-eye-slash]="show" (click)="show = !show"></i>
      </div>

      <label>Login As</label>
      <select [(ngModel)]="user.role" name="role">
        <option value="student">Student</option>
        <option value="college_admin">College Admin</option>
        <option value="super_admin">Super Admin</option>
      </select>

      <div class="form-row">
        <label class="checkbox">
          <input type="checkbox" name="remember">
          <span>Remember me</span>
        </label>
        <a class="forgot" routerLink="/forgot">Forgot password?</a>
      </div>

      <button type="submit">Login</button>
      <p class="error" *ngIf="errorMessage" role="alert" aria-live="assertive">
        {{ errorMessage }}
      </p>

      <p class="link">
        Don't have an account?
        <a routerLink="/register">Create Account</a>
      </p>
    </form>
  </div>
</div>
